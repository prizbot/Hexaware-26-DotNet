<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Departures Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="airport-name">✈ TERMINAL 1 &mdash; DEPARTURES</div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <div class="toolbar">
    <button id="addBtn" class="btn btn-add">+ Add Departure</button>
    <button id="resetBtn" class="btn btn-reset">⟲ Reset Board</button>

    <form id="customForm" class="custom-form">
      <input type="text" id="inputTime" placeholder="Time (e.g. 14:35)" required />
      <input type="text" id="inputFlight" placeholder="Flight (e.g. AI 202)" required />
      <input type="text" id="inputDest" placeholder="Destination" required />
      <input type="text" id="inputGate" placeholder="Gate" required />
      <button type="submit" class="btn btn-custom">Submit Flight</button>
    </form>
  </div>

  <div class="board-header">
    <span class="col col-time">TIME</span>
    <span class="col col-flight">FLIGHT</span>
    <span class="col col-dest">DESTINATION</span>
    <span class="col col-gate">GATE</span>
    <span class="col col-status">STATUS</span>
  </div>

  <!-- The board starts empty. All rows are generated by script.js -->
  <div class="board" id="board"></div>

  <footer class="summary" id="summary">Loading flight data…</footer>

  <script src="script.js"></script>
</body>
</html>
